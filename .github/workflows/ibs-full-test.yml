#
# ibs-full-test.yml — Reusable workflow: build hwpmc module, run IBS ATF tests
#
# Callers use:
#   jobs:
#     ibs:
#       uses: ojanerif/freebsd-ci-actions/.github/workflows/ibs-full-test.yml@main
#       with:
#         kernconf: AMD_IBS

on:
  workflow_call:
    inputs:
      kernconf:
        description: 'Kernel config name'
        type: string
        required: false
        default: 'AMD_IBS'
      srcdir:
        description: 'Relative path for the FreeBSD source checkout'
        type: string
        required: false
        default: 'freebsd-src'
      objdir:
        description: 'MAKEOBJDIRPREFIX for kernel build artifacts'
        type: string
        required: false
        default: '/tmp/obj'
      tests_dir:
        description: 'Relative path to the ATF test suite directory inside ci-actions/'
        type: string
        required: false
        default: 'ci-actions/tests/sys/amd/ibs'
      kyua_args:
        description: 'Whitespace-separated Kyua global arguments before test, e.g. -v parallelism=1'
        type: string
        required: false
        default: ''

jobs:
  build-and-test:
    name: Build + IBS Test
    runs-on: [self-hosted, freebsd, amd-ibs]
    timeout-minutes: 30

    steps:
      - name: Checkout CI actions repo
        uses: actions/checkout@v4
        with:
          repository: ojanerif/freebsd-ci-actions
          path: ci-actions

      - name: Checkout FreeBSD source
        uses: actions/checkout@v4
        with:
          repository: ojanerif/freebsd-src
          path: ${{ inputs.srcdir }}

      - name: Setup build environment
        uses: ./ci-actions/actions/setup-freebsd-build
        with:
          srcdir:   ${{ inputs.srcdir }}
          kernconf: ${{ inputs.kernconf }}
          objdir:   ${{ inputs.objdir }}

      - name: Build hwpmc kernel module
        id: build
        uses: ./ci-actions/actions/build-kernel
        with:
          srcdir:        ${{ inputs.srcdir }}
          kernconf:      ${{ inputs.kernconf }}
          objdir:        ${{ inputs.objdir }}
          build_timeout: '600'

      - name: Run ATF tests
        id: test
        if: steps.build.outputs.build_status == 'success'
        uses: ./ci-actions/actions/run-atf-tests
        with:
          tests_dir:  ${{ inputs.tests_dir }}
          srcdir:     ${{ inputs.srcdir }}
          kernconf:   ${{ inputs.kernconf }}
          kyua_args:  ${{ inputs.kyua_args }}

      - name: Report results
        if: always()
        uses: ./ci-actions/actions/report-results
        with:
          results_xml:     ${{ steps.test.outputs.results_path || 'results.xml' }}
          report_html_dir: kyua-report
          build_status:    ${{ steps.build.outputs.build_status || 'skipped' }}
          test_status:     ${{ steps.test.outputs.test_status   || 'skipped' }}

      # ------------------------------------------------------------------
      # Jira integration — steps are no-ops if secrets are not configured.
      # Set JIRA_BASE_URL, JIRA_USER_EMAIL, JIRA_API_TOKEN in repo secrets.
      # ------------------------------------------------------------------
      - name: Jira login
        if: ${{ secrets.JIRA_API_TOKEN != '' }}
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL:   ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN:  ${{ secrets.JIRA_API_TOKEN }}

      - name: Comment on Jira ticket on failure
        if: ${{ steps.test.outputs.test_status == 'failed' && secrets.JIRA_API_TOKEN != '' }}
        uses: atlassian/gajira-comment@v3
        with:
          issue: SWLSVROS-6363
          comment: |
            ❌ IBS CI failed on FreeBSD runner (`${{ github.ref_name }}`)
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Transition Jira story to Done on success
        if: ${{ steps.test.outputs.test_status == 'passed' && secrets.JIRA_API_TOKEN != '' }}
        uses: atlassian/gajira-transition@v3
        with:
          issue: SWLSVROS-6363
          transition: "Done"

      # ------------------------------------------------------------------
      # Email notification on failure — no-op if NOTIFY_EMAIL is not set.
      # Also requires SMTP_SERVER, SMTP_USERNAME, SMTP_PASSWORD secrets.
      # ------------------------------------------------------------------
      - name: Send failure notification email
        if: >
          failure() &&
          steps.test.outputs.test_status == 'failed' &&
          secrets.NOTIFY_EMAIL != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port:    ${{ secrets.SMTP_PORT || 587 }}
          username:       ${{ secrets.SMTP_USERNAME }}
          password:       ${{ secrets.SMTP_PASSWORD }}
          to:             ${{ secrets.NOTIFY_EMAIL }}
          from:           AMD FreeBSD CI <noreply@amd.com>
          subject:        "[CI FAIL] AMD PMU tests failed on ${{ github.ref_name }}"
          body: |
            FreeBSD PMU CI pipeline failed.

            Branch  : ${{ github.ref_name }}
            Commit  : ${{ github.sha }}
            Run     : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please review the test report and address failing test cases.
            JUnit XML and HTML report are available as workflow artifacts for 90 days.
