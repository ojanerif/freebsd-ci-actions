# call-l3-full.yml — Caller for AMD L3 Counter PMU tests.
# Targets: l3_detect_test, l3_miss_test, l3_hit_test (Zen 5/6, hwpmc).

name: L3 Counter PMU Test Suite

on:
  push:
    branches:
      - main
      - develop
      - 'osvaldo/**'
    paths:
      - 'tests/sys/amd/l3/**'
      - 'sys/dev/hwpmc/**'
      - 'sys/modules/hwpmc/**'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'    # Nightly at 04:00 UTC (offset to avoid runner contention)
    - cron: '0 4 * * 0'    # Weekly (Sunday) 04:00 UTC
  workflow_dispatch:

jobs:
  l3-tests:
    uses: ojanerif/freebsd-ci-actions/.github/workflows/ibs-full-test.yml@main
    secrets: inherit
    with:
      kernconf: AMD_IBS
      tests_dir: ci-actions/tests/sys/amd/l3
